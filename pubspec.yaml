name: morrowly
description: "Morrowly is a calm iOS planner for shaping tomorrow before the day gets loud."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.12.0+1
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.2
  in_app_purchase: ^3.3.0
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5
  sign_in_with_apple: ^8.1.0
  webview_flutter: ^4.14.0

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/morrowly_art/ui/
    - assets/morrowly_art/keepers/
    - assets/morrowly_art/moments/
  fonts:
    - family: MorrowlyNunito
      fonts:
        - asset: assets/morrowly_fonts/morrowly_body_nunito.ttf
    - family: MorrowlyQuicksand
      fonts:
        - asset: assets/morrowly_fonts/morrowly_display_quicksand.ttf
    - family: MorrowlyFredoka
      fonts:
        - asset: assets/morrowly_fonts/morrowly_accent_fredoka.ttf
